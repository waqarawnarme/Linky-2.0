services:
  - type: web
    name: linky-api
    runtime: node
    plan: free
    region: oregon
    rootDir: apps/api
    buildCommand: |
      cd ../.. && \
      corepack enable && \
      corepack prepare pnpm@9.15.0 --activate && \
      pnpm install --no-frozen-lockfile --config.production=false && \
      pnpm --filter @trylinky/prisma run prisma:generate && \
      pnpm --filter @trylinky/prisma run prisma:migrate && \
      pnpm --filter @trylinky/api run build:api
    startCommand: node dist/index.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: APP_FRONTEND_URL
        value: https://linky-2-0-frontend.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: API_BASE_URL
        sync: false
version: "1"
